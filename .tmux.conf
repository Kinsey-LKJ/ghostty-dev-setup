# --- 基础设置 ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0

# --- 前缀键改为 Ctrl+A（比默认 Ctrl+B 更顺手）---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 分屏（更直觉的快捷键）---
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- 重载配置 ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- 面板切换（Alt + 方向键，无需前缀键）---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- 面板大小调整（前缀 + 方向键）---
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5

# --- 新窗口保留当前路径 ---
bind c new-window -c "#{pane_current_path}"

# --- 状态栏 ---
set -g status-position top
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S "
set -g status-right "#[bg=#45475a,fg=#cdd6f4] %H:%M "
set -g status-left-length 20
setw -g window-status-current-format "#[bg=#45475a,fg=#89b4fa,bold] #I:#W "
setw -g window-status-format "#[fg=#6c7086] #I:#W "

# --- 面板边框 ---
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# --- 插件 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 自动保存/恢复会话
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# 初始化插件管理器（保持在最后一行）
run '~/.tmux/plugins/tpm/tpm'
